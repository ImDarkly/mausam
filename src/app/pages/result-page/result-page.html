<div class="container">
  @if (loading()) {
  <mat-spinner></mat-spinner>
  } @else if (error()) {
  <p class="error">{{ error() }}</p>
  } @else if (weather()) {
  <app-weather-card [weather]="weather()!" [unit]="unit()" />
  <app-outfit-card [items]="outfit()" />
  }
  <a routerLink="/">Search again</a>
</div>
