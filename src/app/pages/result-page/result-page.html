<div class="page-wrapper">
  @if (loading()) {
  <div class="spinner"></div>
  } @else if (error()) {
  <p class="error">{{ error() }}</p>
  } @else if (weather()) {
  <app-weather-card [weather]="weather()!" />
  <app-outfit-card [items]="outfit()" />
  }
  <a routerLink="/">Search again</a>
</div>
