<div class="container">
  <h1 class="heading">Where are you heading today?</h1>
  <p class="description">Enter a city to get the weather and outfit recommendations.</p>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label for="city">City</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input
        id="city"
        matInput
        formControlName="city"
        placeholder="Enter a city..."
        autofocus
        [attr.aria-describedby]="cityControl.invalid && cityControl.touched ? 'city-error' : null"
      />
      <mat-error>Please enter a city name.</mat-error>
    </mat-form-field>
    <button mat-flat-button color="primary" type="submit">Get Outfit</button>
  </form>
  @if (recentCities().length) {
  <div class="recent-searches">
    <p>Recent searches</p>
    <ul>
      @for (city of recentCities(); track city) {
      <li>
        <a [routerLink]="['/outfit', city]">{{ city }}</a>
      </li>
      }
    </ul>
  </div>
  }
</div>
